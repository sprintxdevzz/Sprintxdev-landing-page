<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Next Automation — CX Solutions, Enterprise ERP/CRM &amp; Business Automation</title>

    <!-- ── Favicon & App Icons ── -->
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="shortcut icon" href="/favicon-32x32.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />
    <meta name="theme-color" content="#15156B" />

    <!-- ── Core SEO ── -->
    <meta name="description" content="Next Automation delivers AI-powered CX platforms, enterprise ERP/CRM systems, and intelligent automation that drives measurable growth. From survey platforms to complete workflow automation." />
    <meta name="keywords" content="Next Automation, CX solutions, survey platform, ERP, CRM, business automation, AI-powered platforms, workflow automation, enterprise software, digital transformation, nxtaut" />
    <meta name="author" content="Next Automation" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.nxtaut.com/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Next Automation" />
    <meta property="og:title" content="Next Automation — Automate. Optimize. Accelerate Growth." />
    <meta property="og:description" content="Engineering intelligent systems that transform data into competitive advantage." />
    <meta property="og:url" content="https://www.nxtaut.com/" />
    <meta property="og:image" content="https://www.nxtaut.com/favicon-32x32.png" />
    <meta property="og:image:width" content="32" />
    <meta property="og:image:height" content="32" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Next Automation — Automate. Optimize. Accelerate Growth." />
    <meta name="twitter:description" content="Engineering intelligent systems that transform data into competitive advantage." />
    <meta name="twitter:image" content="https://www.nxtaut.com/favicon-32x32.png" />

    <!-- ── Structured Data: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Next Automation",
      "url": "https://www.nxtaut.com/",
      "logo": "https://www.nxtaut.com/favicon-32x32.png",
      "email": "info@nxtaut.com",
      "description": "Next Automation delivers AI-powered CX platforms, enterprise ERP/CRM systems, and intelligent business automation.",
      "serviceArea": { "@type": "Place", "name": "Global" },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Next Automation Solutions",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "CX Solutions",
            "description": "AI-powered customer experience platforms including survey systems and event tracking.",
            "url": "https://www.nxtaut.com/#solutions"
          },
          {
            "@type": "Offer",
            "name": "Enterprise Solutions",
            "description": "Purpose-built ERP, CRM, and performance management platforms.",
            "url": "https://www.nxtaut.com/#solutions"
          },
          {
            "@type": "Offer",
            "name": "Automation",
            "description": "Intelligent workflow automation, RPA, and process orchestration.",
            "url": "https://www.nxtaut.com/#solutions"
          }
        ]
      }
    }
    </script>

    <!-- ── Structured Data: WebSite (enables Sitelinks search box hint) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Next Automation",
      "url": "https://www.nxtaut.com/"
    }
    </script>

    <!-- ── Structured Data: WebPage with named sections (powers Google sitelinks) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Next Automation — CX Solutions, Enterprise ERP/CRM & Business Automation",
      "url": "https://www.nxtaut.com/",
      "description": "Next Automation delivers AI-powered CX platforms, enterprise ERP/CRM, and workflow automation.",
      "about": [
        {
          "@type": "Service",
          "name": "CX Solutions",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "Survey platform and event tracking system for 360-degree customer intelligence.",
          "provider": { "@type": "Organization", "name": "Next Automation" }
        },
        {
          "@type": "Service",
          "name": "Enterprise Solutions",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "ERP, CRM, and performance management platforms for enterprise operations.",
          "provider": { "@type": "Organization", "name": "Next Automation" }
        },
        {
          "@type": "Service",
          "name": "Automation",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "Workflow automation, RPA, and AI-powered process orchestration.",
          "provider": { "@type": "Organization", "name": "Next Automation" }
        }
      ]
    }
    </script>

    <!-- ── Structured Data: SiteNavigationElement (Google sitelinks source) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Next Automation — Site Navigation",
      "itemListElement": [
        {
          "@type": "SiteLinksSearchBox",
          "url": "https://www.nxtaut.com/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.nxtaut.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- ── Structured Data: BreadcrumbList for each solution (helps Google show deep links) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Next Automation Solutions",
      "description": "AI-powered business automation solutions by Next Automation",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "CX Solutions — Survey Platform & Event Tracking",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "Transform customer data into actionable intelligence with AI-powered survey and tracking tools."
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Enterprise Solutions — ERP & CRM",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "Purpose-built ERP and CRM platforms with Power BI integration for enterprise operations."
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Automation — Workflow & RPA",
          "url": "https://www.nxtaut.com/#solutions",
          "description": "Intelligent workflow automation and RPA solutions that run around the clock."
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Our Methodology",
          "url": "https://www.nxtaut.com/#process",
          "description": "Analysis, Design, Implementation, Optimization — our 4-step delivery process."
        },
        {
          "@type": "ListItem",
          "position": 5,
          "name": "Contact Us",
          "url": "https://www.nxtaut.com/#contact",
          "description": "Book a demo or get in touch with the Next Automation team."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
