<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Next Automation — CX Solutions, Enterprise ERP/CRM &amp; Business Automation</title>

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/webp" href="/nextautomationlogo.webp" sizes="64x64" />
    <link rel="shortcut icon" href="/nextautomationlogo.webp" type="image/webp" />
    <link rel="apple-touch-icon" href="/nextautomationlogo.webp" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Basic SEO -->
    <meta
      name="description"
      content="Next Automation delivers AI-powered CX platforms, enterprise ERP/CRM systems, and intelligent automation that drives measurable growth. From survey platforms to complete workflow automation."
    />
    <meta
      name="keywords"
      content="Next Automation, CX solutions, ERP, CRM, business automation, AI-powered platforms, survey platform, workflow automation, enterprise software, digital transformation"
    />
    <meta name="author" content="Next Automation" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#15156B" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.nxtaut.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:title"
      content="Next Automation — Automate. Optimize. Accelerate Growth."
    />
    <meta
      property="og:description"
      content="Engineering intelligent systems that transform data into competitive advantage."
    />
    <meta property="og:url" content="https://www.nxtaut.com/" />
    <meta property="og:site_name" content="Next Automation" />
    <meta property="og:image" content="https://www.nxtaut.com/nextautomationlogo.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="418" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NextAutomation" />
    <meta name="twitter:creator" content="@NextAutomation" />
    <meta
      name="twitter:title"
      content="Next Automation — Automate. Optimize. Accelerate Growth."
    />
    <meta
      name="twitter:description"
      content="Engineering intelligent systems that transform data into competitive advantage."
    />
    <meta name="twitter:image" content="https://www.nxtaut.com/nextautomationlogo.webp" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Next Automation",
        "url": "https://www.nxtaut.com/",
        "logo": "https://www.nxtaut.com/nextautomationlogo.webp",
        "description": "Next Automation delivers AI-powered CX platforms, enterprise ERP/CRM systems, and intelligent automation that drives measurable growth.",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@nxtaut.com",
          "contactType": "customer service"
        }
      }
    </script>

    <!-- Structured Data: WebSite with SiteLinksSearchBox hint -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Next Automation",
        "url": "https://www.nxtaut.com/"
      }
    </script>

    <!-- Structured Data: Solutions as SiteNavigation for sitelinks -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "Next Automation Solutions",
        "description": "AI-powered CX platforms, enterprise ERP/CRM, and intelligent automation solutions.",
        "url": "https://www.nxtaut.com/",
        "itemListElement": [
          {
            "@type": "SiteLinksAction",
            "name": "CX Solutions",
            "description": "AI-powered customer experience platforms including survey systems and event tracking.",
            "url": "https://www.nxtaut.com/#solutions",
            "position": 1
          },
          {
            "@type": "SiteLinksAction",
            "name": "Enterprise ERP & CRM",
            "description": "Comprehensive enterprise resource planning, CRM, and performance KPI systems.",
            "url": "https://www.nxtaut.com/#solutions",
            "position": 2
          },
          {
            "@type": "SiteLinksAction",
            "name": "Intelligent Automation",
            "description": "Operations automation, RPA, and end-to-end workflow automation.",
            "url": "https://www.nxtaut.com/#solutions",
            "position": 3
          },
          {
            "@type": "SiteLinksAction",
            "name": "Contact Us",
            "description": "Get in touch with Next Automation to start your project.",
            "url": "https://www.nxtaut.com/#contact",
            "position": 4
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
